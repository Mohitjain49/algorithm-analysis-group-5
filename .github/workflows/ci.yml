name: Vue.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.3.0'

      - name: Install Dependencies
        run: npm ci

      - name: Building...
        run: npm run build